name: Create release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  release:
    name: Release pushed tag
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Get changelog from CHANGELOG.md
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          echo "Tag: $tag"
          changelog=$(awk "/^## \[$tag\]/{flag=1;next}/^## /{flag=0}flag" CHANGELOG.md)
          echo "$changelog" > NOTES.md
          cat NOTES.md
      - name: Create release
        if: ${{ !env.ACT }} # do not run locally
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
        run: |
          gh release create "$tag" \
              --repo="$GITHUB_REPOSITORY" \
              --title="$tag" \
              -F NOTES.md
      - name: Get Main version
        id: vars
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          main_version=$(echo "$REF_NAME" | cut -d '.' -f 1)
          echo "Main version: $main_version"
          echo "main_version=$main_version" >> "$GITHUB_OUTPUT"
      - name: Update Main version
        if: ${{ !env.ACT }} # do not run locally
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAIN_VERSION: ${{ steps.vars.outputs.main_version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          git tag -f "$MAIN_VERSION" "$REF_NAME"
          git push origin "$MAIN_VERSION" --force